<!DOCTYPE html>
<html lang="ko">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🌿 북파인더 5.0</title>

<link rel="stylesheet" href="style.css">

<!-- 카카오 지도 SDK -->
<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=YOUR_JS_KEY&libraries=services"></script>

</head>

<body>

<div class="container">

    <h1>📚 북파인더</h1>

    <p>책 + 지역으로 서점 찾기 🌳</p>

    <input id="searchInput" placeholder="책 제목">
    <input id="regionInput" placeholder="지역 (예: 부산 부산진구)">

    <button onclick="searchAll()">🔍 찾기</button>

    <div id="result"></div>

    <div id="map" style="width:100%;height:300px;margin-top:20px;border-radius:20px;"></div>

</div>

<script src="script.js"></script>

</body>
</html>
